<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title>Seedance 2.0 Skill OS</title>
  <desc>Editorial masthead on warm paper: serif Seedance 2.0 Skill OS wordmark with monospace specification labels, a 21:9 viewfinder frame with timecode, and film sprocket details.</desc>
  <defs>
    <style>
      .display{font:400 88px Georgia,'Times New Roman',Times,serif;fill:#1C1914;letter-spacing:-1px}
      .display-i{font:italic 400 88px Georgia,'Times New Roman',Times,serif;fill:#1C1914;letter-spacing:-1px}
