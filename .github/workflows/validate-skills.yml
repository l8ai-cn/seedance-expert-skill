name: validate-seedance-skill

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPYCACHEPREFIX: /tmp/seedance-pycache
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-validation.lock
      - name: Install validation dependencies
        run: python -m pip install --require-hashes --requirement requirements-validation.lock
      - name: Validate skill metadata and required files
        run: python scripts/validate_skills.py --strict
      - name: Audit stale and risky active wording
        run: python scripts/content_audit.py
      - name: Validate eval schema
        run: python scripts/eval_schema_check.py
      - name: Execute JSON Schemas against declared fixtures
        run: python scripts/schema_check.py --strict
      - name: Validate claim-level evidence and freshness
        run: >-
          python tools/evidence_registry.py
          --enforce-freshness
          --report /tmp/evidence-registry-report.json
      - name: Validate candidate model and surface profiles
        run: python scripts/profile_check.py
      - name: Exercise evidence boundary tests
        run: python -m unittest tests.test_evidence_registry -v
      - name: Exercise typed surface-binding boundary tests
        run: python -m unittest tests.test_surface_bindings -v
      - name: Audit frontend README and SVG assets
        run: python scripts/design_audit.py
      - name: Exercise legacy source-registry compatibility entry point
        run: python scripts/source_registry_check.py
      - name: Validate multilingual vocabulary schema
        run: python scripts/vocab_schema_check.py --strict
      - name: Validate sequence project state
        run: python scripts/project_state_check.py
      - name: Validate continuity chains
        run: python scripts/continuity_chain_check.py --strict
      - name: Validate behavior contracts
        run: python scripts/behavior_contract_check.py
      - name: Validate sequence evals
        run: python scripts/sequence_eval_check.py
      - name: Validate generation-run fixtures
        run: python scripts/generation_run_check.py
      - name: Lint compiled prompts
        run: python scripts/prompt_lint.py --self-test
      - name: Check eval harness wiring (offline)
        run: python scripts/eval_run.py --self-test
      - name: Check frame-extraction tool wiring (offline)
        run: python scripts/extract_last_frame.py --self-test
      - name: Check surface-binding renderer wiring (offline, candidate preview only)
        run: python scripts/render_surface_bindings.py --self-test
      - name: Validate deterministic runtime package boundary
        run: python tools/runtime_package.py --dry-run
      - name: Exercise transactional installer and rollback
        run: |
          python scripts/install_codex_skill.py --dest /tmp/seedance-ci-skills --dry-run
          python scripts/install_codex_skill.py --dest /tmp/seedance-ci-skills
          python scripts/install_codex_skill.py --dest /tmp/seedance-ci-skills --check
          python scripts/install_codex_skill.py --dest /tmp/seedance-ci-skills --force
          python scripts/install_codex_skill.py --dest /tmp/seedance-ci-skills --rollback
          python scripts/install_codex_skill.py --dest /tmp/seedance-ci-skills --check
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Compile Python files
        run: python -m compileall scripts tests tools
      - name: Prove validation is idempotent after compilation
        run: python scripts/validate_skills.py --strict
      - name: Check diff whitespace
        run: git diff --check

  package-portability:
    name: package-portability (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Validate runtime package and transaction safety
        run: |
          python tools/runtime_package.py --dry-run
          python -m unittest tests.test_runtime_package -v
          python -m unittest tests.test_eval_harness -v
          python -c "import subprocess, sys; [subprocess.run([sys.executable, 'scripts/eval_run.py', '--self-test'], check=True) for _ in range(10)]"
