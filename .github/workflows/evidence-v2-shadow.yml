name: evidence-v2-shadow

on:
  push:
    paths:
      - ".github/evidence-v2/**"
      - ".github/workflows/evidence-v2-shadow.yml"
  pull_request:
    paths:
      - ".github/evidence-v2/**"
      - ".github/workflows/evidence-v2-shadow.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

concurrency:
  group: evidence-v2-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/evidence-v2/requirements.lock
      - name: Install hash-locked validator dependencies
        run: python -m pip install --require-hashes -r .github/evidence-v2/requirements.lock
      - name: Run evidence validator tests
        run: python -B -m unittest discover -s .github/evidence-v2/tests -v
      - name: Validate shadow evidence records
        run: >-
          python -B .github/evidence-v2/check_evidence.py
          --shadow-only
          --enforce-freshness
          --report /tmp/evidence-v2-report.json
      - name: Upload deterministic evidence report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: evidence-v2-report
          path: /tmp/evidence-v2-report.json
          if-no-files-found: error
