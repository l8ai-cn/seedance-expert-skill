name: evidence-freshness-proposal

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: evidence-freshness-default-branch
  cancel-in-progress: false

jobs:
  validate:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPYCACHEPREFIX: /tmp/seedance-pycache
    outputs:
      has_proposal: ${{ steps.proposal.outputs.has_proposal }}
      json_b64: ${{ steps.proposal.outputs.json_b64 }}
      markdown_b64: ${{ steps.proposal.outputs.markdown_b64 }}
      json_sha256: ${{ steps.proposal.outputs.json_sha256 }}
      markdown_sha256: ${{ steps.proposal.outputs.markdown_sha256 }}
    steps:
      - name: Check out the trusted default branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-validation.lock
      - name: Install hash-locked validation dependencies
        run: python -m pip install --require-hashes --requirement requirements-validation.lock
      - name: Prove the evidence boundary before proposing work
        run: python -m unittest tests.test_evidence_registry -v
      - name: Build an offline deterministic proposal
        id: proposal
        shell: bash
        run: |
          set -euo pipefail
          rm -f /tmp/evidence-proposal.json /tmp/evidence-proposal.md
          python tools/evidence_registry.py \
            --report /tmp/evidence-report.json \
            --proposal-json /tmp/evidence-proposal.json \
            --proposal-markdown /tmp/evidence-proposal.md
          if [[ ! -f /tmp/evidence-proposal.json ]]; then
            echo "has_proposal=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          test -f /tmp/evidence-proposal.md
          test "$(wc -c < /tmp/evidence-proposal.json)" -le 49152
          test "$(wc -c < /tmp/evidence-proposal.md)" -le 49152
          echo "has_proposal=true" >> "$GITHUB_OUTPUT"
          echo "json_b64=$(base64 -w0 /tmp/evidence-proposal.json)" >> "$GITHUB_OUTPUT"
          echo "markdown_b64=$(base64 -w0 /tmp/evidence-proposal.md)" >> "$GITHUB_OUTPUT"
          echo "json_sha256=$(sha256sum /tmp/evidence-proposal.json | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"
          echo "markdown_sha256=$(sha256sum /tmp/evidence-proposal.md | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

  publish:
    needs: validate
    if: >-
      needs.validate.result == 'success' &&
      needs.validate.outputs.has_proposal == 'true' &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      PROPOSAL_BRANCH: automation/evidence-freshness
      PROPOSAL_JSON_B64: ${{ needs.validate.outputs.json_b64 }}
      PROPOSAL_MARKDOWN_B64: ${{ needs.validate.outputs.markdown_b64 }}
      EXPECTED_JSON_SHA256: ${{ needs.validate.outputs.json_sha256 }}
      EXPECTED_MARKDOWN_SHA256: ${{ needs.validate.outputs.markdown_sha256 }}
    steps:
      - name: Check out the trusted default branch without executing repository code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
      - name: Validate and materialize the bounded proposal
        shell: bash
        run: |
          set -euo pipefail
          [[ "$EXPECTED_JSON_SHA256" =~ ^[a-f0-9]{64}$ ]]
          [[ "$EXPECTED_MARKDOWN_SHA256" =~ ^[a-f0-9]{64}$ ]]
          printf '%s' "$PROPOSAL_JSON_B64" | base64 --decode > /tmp/evidence-proposal.json
          printf '%s' "$PROPOSAL_MARKDOWN_B64" | base64 --decode > /tmp/evidence-proposal.md
          test "$(wc -c < /tmp/evidence-proposal.json)" -le 49152
          test "$(wc -c < /tmp/evidence-proposal.md)" -le 49152
          printf '%s  %s\n' "$EXPECTED_JSON_SHA256" /tmp/evidence-proposal.json | sha256sum --check
          printf '%s  %s\n' "$EXPECTED_MARKDOWN_SHA256" /tmp/evidence-proposal.md | sha256sum --check
          jq -e '
            .schema_version == 1 and
            .activation_enabled == false and
            .registry_error_count >= 0 and
            (.notice | type == "string") and
            (.claim_actions | type == "array") and
            (.release_blocker_ids | type == "array") and
            (keys | sort == ["activation_enabled", "claim_actions", "notice", "registry_error_count", "release_blocker_ids", "schema_version"])
          ' /tmp/evidence-proposal.json > /dev/null
          grep -Fqx '# Evidence freshness proposal' <(head -n 1 /tmp/evidence-proposal.md)
      - name: Update only the protected automation branch and open a draft PR
        shell: bash
        run: |
          set -euo pipefail
          remote_sha=""
          if git ls-remote --exit-code --heads origin "refs/heads/$PROPOSAL_BRANCH" > /tmp/evidence-remote-ref; then
            remote_sha="$(cut -f 1 /tmp/evidence-remote-ref)"
            [[ "$remote_sha" =~ ^[a-f0-9]{40}$ ]]
            git fetch --no-tags origin "refs/heads/$PROPOSAL_BRANCH:refs/remotes/origin/$PROPOSAL_BRANCH"
            test "$(git show -s --format=%ae "origin/$PROPOSAL_BRANCH")" = '41898282+github-actions[bot]@users.noreply.github.com'
            test "$(git show -s --format=%ce "origin/$PROPOSAL_BRANCH")" = '41898282+github-actions[bot]@users.noreply.github.com'
            existing_pr="$(gh pr list --state open --head "$PROPOSAL_BRANCH" --base "$DEFAULT_BRANCH" --json number,isDraft,author,headRefName,baseRefName,headRefOid)"
            test "$(jq 'length' <<< "$existing_pr")" -eq 1
            jq -e --arg head "$PROPOSAL_BRANCH" --arg base "$DEFAULT_BRANCH" --arg sha "$remote_sha" '
              .[0].isDraft == true and
              (.[0].author.login == "github-actions[bot]" or .[0].author.login == "github-actions") and
              .[0].headRefName == $head and
              .[0].baseRefName == $base and
              .[0].headRefOid == $sha
            ' <<< "$existing_pr" > /dev/null
            pr_number="$(jq -r '.[0].number' <<< "$existing_pr")"
            git diff --name-only "origin/$DEFAULT_BRANCH...origin/$PROPOSAL_BRANCH" > /tmp/evidence-branch-paths
            unexpected="$(awk '!/^\.github\/evidence-freshness\/proposal\.(json|md)$/{print}' /tmp/evidence-branch-paths)"
            test -z "$unexpected"
            for path in .github/evidence-freshness/proposal.json .github/evidence-freshness/proposal.md; do
              test "$(git ls-tree "origin/$PROPOSAL_BRANCH" -- "$path" | awk '{print $1 " " $2}')" = '100644 blob'
            done
            test "$(git cat-file -s "origin/$PROPOSAL_BRANCH:.github/evidence-freshness/proposal.json")" -le 49152
            test "$(git cat-file -s "origin/$PROPOSAL_BRANCH:.github/evidence-freshness/proposal.md")" -le 49152
            if cmp -s <(git show "origin/$PROPOSAL_BRANCH:.github/evidence-freshness/proposal.json") /tmp/evidence-proposal.json && \
               cmp -s <(git show "origin/$PROPOSAL_BRANCH:.github/evidence-freshness/proposal.md") /tmp/evidence-proposal.md; then
              changed=false
            else
              changed=true
            fi
          else
            changed=true
            pr_number=""
          fi

          if [[ "$changed" == true ]]; then
            git switch --force-create "$PROPOSAL_BRANCH" "origin/$DEFAULT_BRANCH"
            test -d .github
            test ! -L .github
            if [[ -e .github/evidence-freshness || -L .github/evidence-freshness ]]; then
              test -d .github/evidence-freshness
              test ! -L .github/evidence-freshness
            else
              mkdir .github/evidence-freshness
            fi
            for target in .github/evidence-freshness/proposal.json .github/evidence-freshness/proposal.md; do
              if [[ -e "$target" || -L "$target" ]]; then
                test -f "$target"
                test ! -L "$target"
              fi
            done
            cp /tmp/evidence-proposal.json .github/evidence-freshness/proposal.json
            cp /tmp/evidence-proposal.md .github/evidence-freshness/proposal.md
            git add -- .github/evidence-freshness/proposal.json .github/evidence-freshness/proposal.md
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m 'chore: propose evidence freshness review'
            if [[ -n "$remote_sha" ]]; then
              git push --force-with-lease="refs/heads/$PROPOSAL_BRANCH:$remote_sha" origin "HEAD:refs/heads/$PROPOSAL_BRANCH"
            else
              git push --force-with-lease="refs/heads/$PROPOSAL_BRANCH:" origin "HEAD:refs/heads/$PROPOSAL_BRANCH"
            fi
          fi

          if [[ -z "$pr_number" ]]; then
            gh pr create \
              --draft \
              --base "$DEFAULT_BRANCH" \
              --head "$PROPOSAL_BRANCH" \
              --title 'chore: review expiring evidence claims' \
              --body 'Offline TTL alert only. No source was fetched, no claim was renewed, and no runtime guidance was activated. GitHub suppresses workflow recursion for this token-created push and PR, so a human must run validate-seedance-skill with workflow_dispatch on this branch before merge. Then verify official sources and replace the proposal with reviewed evidence changes.'
          fi

  cleanup:
    needs: validate
    if: >-
      needs.validate.result == 'success' &&
      needs.validate.outputs.has_proposal == 'false' &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      PROPOSAL_BRANCH: automation/evidence-freshness
    steps:
      - name: Check out the trusted default branch without executing repository code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
      - name: Close only an unchanged bot-owned stale proposal
        shell: bash
        run: |
          set -euo pipefail
          existing_pr="$(gh pr list --state open --head "$PROPOSAL_BRANCH" --base "$DEFAULT_BRANCH" --json number,isDraft,author,headRefName,baseRefName,headRefOid)"
          count="$(jq 'length' <<< "$existing_pr")"
          if [[ "$count" -eq 0 ]]; then
            exit 0
          fi
          test "$count" -eq 1
          jq -e --arg head "$PROPOSAL_BRANCH" --arg base "$DEFAULT_BRANCH" '
            .[0].isDraft == true and
            (.[0].author.login == "github-actions[bot]" or .[0].author.login == "github-actions") and
            .[0].headRefName == $head and
            .[0].baseRefName == $base
          ' <<< "$existing_pr" > /dev/null
          pr_number="$(jq -r '.[0].number' <<< "$existing_pr")"
          remote_sha="$(jq -r '.[0].headRefOid' <<< "$existing_pr")"
          [[ "$remote_sha" =~ ^[a-f0-9]{40}$ ]]
          git fetch --no-tags origin "refs/heads/$PROPOSAL_BRANCH:refs/remotes/origin/$PROPOSAL_BRANCH"
          test "$(git rev-parse "origin/$PROPOSAL_BRANCH")" = "$remote_sha"
          test "$(git show -s --format=%ae "origin/$PROPOSAL_BRANCH")" = '41898282+github-actions[bot]@users.noreply.github.com'
          test "$(git show -s --format=%ce "origin/$PROPOSAL_BRANCH")" = '41898282+github-actions[bot]@users.noreply.github.com'
          git diff --name-only "origin/$DEFAULT_BRANCH...origin/$PROPOSAL_BRANCH" > /tmp/evidence-stale-paths
          unexpected="$(awk '!/^\.github\/evidence-freshness\/proposal\.(json|md)$/{print}' /tmp/evidence-stale-paths)"
          test -z "$unexpected"
          for path in .github/evidence-freshness/proposal.json .github/evidence-freshness/proposal.md; do
            test "$(git ls-tree "origin/$PROPOSAL_BRANCH" -- "$path" | awk '{print $1 " " $2}')" = '100644 blob'
          done
          gh pr close "$pr_number" --delete-branch --comment 'Closing this untouched offline proposal because no checked-in claim is now due or expired. No evidence or runtime guidance was changed.'
